    <script>
      window.addEventListener('error', function(e) {
        let errDiv = document.createElement('div');
        errDiv.style = 'position:fixed;top:50px;left:50px;z-index:99999;background:red;color:white;padding:20px;font-size:18px;max-width:80%;max-height:80%;overflow:auto;font-family:monospace;border-radius:8px;box-shadow:0 0 20px rgba(0,0,0,0.5);';
        errDiv.innerHTML = '<strong>GLOBAL ERROR CATCHER:</strong><br><br>' + e.message + '<br><br>File: ' + e.filename + ':' + e.lineno + ':' + e.colno + '<br><br>' + (e.error ? e.error.stack : '');
        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(e) {
        let errDiv = document.createElement('div');
        errDiv.style = 'position:fixed;top:50px;left:50px;z-index:99999;background:orange;color:white;padding:20px;font-size:18px;max-width:80%;max-height:80%;overflow:auto;font-family:monospace;border-radius:8px;box-shadow:0 0 20px rgba(0,0,0,0.5);';
        errDiv.innerHTML = '<strong>UNHANDLED PROMISE REJECTION:</strong><br><br>' + (e.reason ? e.reason.stack || e.reason : 'Unknown reason');
        document.body.appendChild(errDiv);
      });
    </script>
